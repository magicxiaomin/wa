<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WA Remote Trigger</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #141414; background: #f7f7f4; }
    body { margin: 0; }
    main { max-width: 760px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { font-size: 26px; margin: 0 0 18px; }
    section { margin: 18px 0; }
    label { display: block; font-size: 13px; font-weight: 650; margin-bottom: 6px; }
    input, textarea, button { box-sizing: border-box; width: 100%; font: inherit; border-radius: 6px; border: 1px solid #b9b9b1; padding: 10px; background: white; }
    textarea { min-height: 96px; resize: vertical; }
    button { cursor: pointer; background: #245f9f; color: white; border-color: #245f9f; font-weight: 700; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .contacts { border: 1px solid #c9c9c1; border-radius: 6px; background: white; max-height: 320px; overflow: auto; }
    .contact { display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: start; padding: 9px 10px; border-bottom: 1px solid #eeeeea; }
    .contact:last-child { border-bottom: 0; }
    .contact small { display: block; color: #666; word-break: break-all; }
    pre { white-space: pre-wrap; word-break: break-word; background: #1e1f20; color: #f5f5f0; padding: 12px; border-radius: 6px; min-height: 92px; }
  </style>
</head>
<body>
  <main>
    <h1>WA Remote Trigger</h1>
    <section>
      <label for="token">Token</label>
      <input id="token" type="password" autocomplete="off" placeholder="至少 32 字符">
    </section>
    <section class="row">
      <button id="load">拉取联系人</button>
      <button id="send">发送给已选联系人</button>
    </section>
    <section>
      <label>联系人（最多 3 个）</label>
      <div id="contacts" class="contacts"></div>
    </section>
    <section>
      <label for="text">文本</label>
      <textarea id="text" placeholder="输入要立即发送的一条文本"></textarea>
    </section>
    <section>
      <label>结果</label>
      <pre id="log"></pre>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
